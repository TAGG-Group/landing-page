name: CI — Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: TypeScript & Vite build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build
