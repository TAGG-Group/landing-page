services:
  landing-page:
    image: ghcr.io/tagg-group/landing-page:latest
    container_name: landing-page
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`tagg-group.com`) || Host(`www.tagg-group.com`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing.middlewares=www-redirect,crowdsec@file"
      # Redirect www -> non-www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.tagg-group\\.com/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://tagg-group.com/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
